<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#080b1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>CrackTheX</title>

  <!-- Typography: Space Grotesk + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Cropper.js v1.6.2 CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Mobile top bar (hidden on desktop) -->
  <div id="mobile-topbar" class="glass-bar mobile-topbar">
    <button id="btn-menu" class="btn-icon" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>
    <span id="topbar-equation" class="topbar-equation" data-i18n="newProblem">Új feladat</span>
    <button id="btn-new-session" class="btn-icon" data-i18n-aria="newProblem" aria-label="Új feladat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title" data-i18n="equations">Egyenletek</h2>
      <button id="btn-new-sidebar" class="btn-icon" data-i18n-aria="newProblem" aria-label="Új egyenlet">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>
    <div id="session-list" class="session-list">
      <!-- Session cards rendered dynamically by sessions.js -->
    </div>
    <div class="sidebar-footer">
      <div class="lang-selector">
        <button class="lang-btn active" data-lang="hu">HU</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="de">DE</button>
      </div>
    </div>
  </aside>

  <!-- Backdrop for mobile drawer -->
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <!-- Main content area -->
  <main id="main-area">
  <div id="app">

    <!-- STATE 1: HOME / ENTRY -->
    <section id="state-scanner" class="app-state active">
      <!-- Home screen (default view) -->
      <div id="home-content" class="home-content">
        <div id="app-logo" class="gradient-text">CrackTheX</div>
        <p class="home-tagline" data-i18n="homeTagline">Oldd meg az egyenletet lépésről lépésre!</p>
        <div class="entry-options">
          <button class="glass-card entry-card entry-card--primary" id="entry-keyboard">
            <svg class="entry-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/>
            </svg>
            <div>
              <span class="entry-label" data-i18n="typeEntry">Begépelés</span>
              <span class="entry-subtitle" data-i18n="typeEntrySubtitle">Írd be az egyenletet</span>
            </div>
          </button>
          <button class="glass-card entry-card" id="entry-camera">
            <svg class="entry-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <div>
              <span class="entry-label" data-i18n="photoEntry">Fotózás</span>
              <span class="entry-subtitle" data-i18n="photoEntrySubtitle">Fotózd le az egyenletet</span>
            </div>
          </button>
        </div>
      </div>
      <!-- Camera sub-view -->
      <div id="camera-view" style="display:none;">
        <button id="btn-camera-back" class="btn-back-nav" data-i18n-aria="back" aria-label="Vissza">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <video id="camera-feed" autoplay playsinline></video>
        <canvas id="capture-canvas" style="display:none;"></canvas>
        <img id="captured-image" style="display:none;" alt="Captured" />
        <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none;" />
        <div id="scanner-controls" class="glass-bar">
          <button id="btn-capture" class="btn-primary" data-i18n="takePhoto">Fotózás</button>
        </div>
      </div>
    </section>

    <!-- STATE 2: VALIDATOR -->
    <section id="state-validator" class="app-state">
      <button id="btn-validator-back" class="btn-back-nav" data-i18n-aria="back" aria-label="Vissza">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="validator-content">
        <div class="glass-card" id="card-original">
          <h3 class="card-label" id="label-original" data-i18n="original">Eredeti</h3>
          <img id="cropped-preview" alt="Cropped equation" />
        </div>
        <div class="glass-card" id="card-recognized">
          <h3 class="card-label" id="label-recognized" data-i18n="recognized">Felismert képlet</h3>
          <div id="latex-render"></div>
          <input type="text" id="latex-input" class="glass-input" data-i18n-placeholder="latexPlaceholder" placeholder="LaTeX képlet..." />
          <div id="ocr-warning" class="warning-banner" data-i18n="lowConfidence" style="display:none;">
            Alacsony felismerési biztonság - ellenőrizd a képletet!
          </div>
        </div>
        <div id="validator-loading" class="loading-spinner" style="display:none;">
          <div class="spinner"></div>
          <span data-i18n="recognizing">Felismerés...</span>
        </div>
        <button id="btn-solve" class="btn-primary btn-accent" data-i18n="solve">Megoldás!</button>
      </div>
    </section>

    <!-- STATE 3: INTERACTIVE BOARD -->
    <section id="state-board" class="app-state">
      <div id="board-content">
        <div id="steps-container"></div>
        <div id="interactive-zone" class="glass-card interactive-card"></div>
      </div>
      <button id="btn-new" class="fab" data-i18n="newProblem">Új feladat</button>
    </section>

  </div>
  </main>

  <!-- Undo toast -->
  <div id="undo-toast" class="undo-toast" style="display:none;">
    <span data-i18n="deleted">Törölve.</span>
    <button id="btn-undo" class="btn-undo" data-i18n="undo">Visszavonás</button>
  </div>

  <!-- JS Libraries (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Solve.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>

  <!-- Local JS (load order matters) -->
  <script src="js/i18n.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/solver.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/validator.js"></script>
  <script src="js/interactive-board.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
